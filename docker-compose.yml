version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pmw-postgres
    environment:
      POSTGRES_DB: pixel_music_world
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: pmw-redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
